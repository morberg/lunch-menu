<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens Lunch</title>
    <style>
        body {
            font-family: 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #dad7cd;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #344e41;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .restaurant {
            background: #faf7ed;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 4px #cac7bd;
        }

        .day-section {
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .day-tab {
            border: 1px solid #588157;
            background: #faf7ed;
            color: #344e41;
            padding: 6px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
        }

        .day-tab[aria-selected="true"] {
            background: #588157;
            color: #fff;
            font-weight: 600;
        }

        .day-panel {
            display: none;
        }

        .day-panel.active {
            display: block;
        }

        .day-title {
            font-weight: bold;
            color: #3a5a40;
            font-size: 18px;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #588157;
        }

        .menu-item-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .menu-item-price {
            color: #344e41;
            float: right;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
        }

        th,
        td {
            padding: 4px 6px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f0f0f0;
            font-size: 15px;
        }

        td {
            border-top: 1px solid #eee;
        }

        .hidden {
            display: none !important;
        }

        .restaurant-link {
            color: inherit;
            text-decoration: none;
        }

        .menu-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 4px;
        }

        .cell {
            padding: 4px 6px;
            vertical-align: top;
        }

        .cell-price {
            padding: 4px 6px;
            text-align: right;
            vertical-align: top;
            color: #28a745;
        }

        .placeholder-note {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .restaurant-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .restaurant-title-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-btn {
            background: none;
            border: 1px solid #588157;
            color: #344e41;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            cursor: pointer;
            line-height: 1.2;
        }

        .toggle-btn:hover {
            background: #588157;
            color: #fff;
        }

        .restaurant.collapsed .restaurant-content {
            display: none;
        }

        .restaurant.collapsed {
            opacity: 0.7;
        }

        .page-footer {
            text-align: center;
            margin-top: 24px;
            padding-bottom: 12px;
        }

        .api-docs-link {
            color: #588157;
            text-decoration: none;
            font-size: 14px;
        }

        .api-docs-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                padding: 6px;
            }

            .restaurant {
                padding: 7px;
            }
        }

        @media (max-width: 430px) {
            .day-tab {
                padding: 5px 8px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Dagens Lunch</h1>
    </header>

    <main>
        <div id="loading" class="loading">
            Laddar menyer...
        </div>

        <div id="content" class="hidden"></div>
    </main>

    <footer class="page-footer">
        <a href="/api/docs" class="api-docs-link">API Documentation</a>
    </footer>

    <script>
        async function loadMenus() {
            try {
                const response = await fetch('/api/menus');
                const data = await response.json();
                document.getElementById('loading').classList.add('hidden');
                const contentEl = document.getElementById('content');
                contentEl.classList.remove('hidden');
                displayMenus(data);
            } catch (error) {
                const loading = document.getElementById('loading');
                loading.innerHTML = '<div class="error">Kunde inte ladda menyer. Försök igen senare.</div>';
                console.error('Error loading menus:', error);
            }
        }

        function displayMenus(data) {
            const content = document.getElementById('content');
            content.innerHTML = '';
            const days = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag'];
            const dayMapping = { 'Monday': 'Måndag', 'Tuesday': 'Tisdag', 'Wednesday': 'Onsdag', 'Thursday': 'Torsdag', 'Friday': 'Fredag', 'Hela veckan': 'Hela veckan' };
            const restaurants = [
                { name: 'Edison', key: 'edison', data: data.edison, url: 'https://restaurangedison.se/lunch/' },
                { name: 'Grenden', key: 'grenden', data: data.grenden, url: 'https://www.nordrest.se/restaurang/grenden/' },
                { name: 'Food Hall', key: 'foodhall', data: data.foodhall, url: 'https://www.nordrest.se/restaurang/food-hall/', weeklyOnly: true },
                { name: 'Bricks Eatery', key: 'bricks', data: data.bricks, url: 'https://brickseatery.se/lunch/' },
                { name: 'Kantin', key: 'kantin', data: data.kantin, url: 'https://www.kantinlund.se/' },
                { name: 'Smakapakina', key: 'smakapakina', data: data.smakapakina, url: 'https://www.smakapakina.se/meny' },
                { name: 'Eatery', key: 'eatery', data: data.eatery, url: 'https://eatery.se/anlaggningar/lund' },
            ];

            const restaurantsWithAnyItems = new Set();
            restaurants.forEach(r => { if (Array.isArray(r.data) && r.data.length > 0) restaurantsWithAnyItems.add(r.key); });

            const collapsedKey = 'collapsedRestaurantsV1';
            const collapsed = new Set(JSON.parse(localStorage.getItem(collapsedKey) || '[]'));
            function persist() { localStorage.setItem(collapsedKey, JSON.stringify([...collapsed])); }
            function normalizeDay(day) { return dayMapping[day] || day; }
            function buildRestaurantHeader(r, hasUniformPrice, uniformPrice) {
                const isCollapsed = collapsed.has(r.key);
                const priceSpan = (hasUniformPrice && uniformPrice !== null) ? `<span class="menu-item-price">${uniformPrice} kr</span>` : '';
                return `<div class="restaurant-header">
  <div class="restaurant-title-wrap">
    <button class="toggle-btn" data-rest="${r.key}" aria-expanded="${!isCollapsed}">${isCollapsed ? '+' : '−'}</button>
    <strong><a href="${r.url}" target="_blank" class="restaurant-link">${r.name}</a></strong>${priceSpan}
  </div>
</div>`;
            }
            function applyToggleHandlers(scope) {
                scope.querySelectorAll('.toggle-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const key = btn.getAttribute('data-rest');
                        if (collapsed.has(key)) collapsed.delete(key); else collapsed.add(key);
                        persist();
                        // Update all instances
                        document.querySelectorAll(`.restaurant[data-rest='${key}']`).forEach(div => {
                            if (collapsed.has(key)) div.classList.add('collapsed'); else div.classList.remove('collapsed');
                            // Update button symbol & aria
                            div.querySelectorAll(`.toggle-btn[data-rest='${key}']`).forEach(b => {
                                const isCol = collapsed.has(key);
                                b.textContent = isCol ? '+' : '−';
                                b.setAttribute('aria-expanded', String(!isCol));
                            });
                        });
                    });
                });
            }

            const tabs = document.createElement('div');
            tabs.className = 'tabs';
            tabs.setAttribute('role', 'tablist');

            const panels = document.createElement('div');

            function createMenuTable(items, hasUniformPrice) {
                const table = document.createElement('table');
                table.className = 'menu-table';
                table.innerHTML = '<tbody></tbody>';
                const tbody = table.querySelector('tbody');
                items.forEach(item => {
                    const tr = document.createElement('tr');
                    if (hasUniformPrice) {
                        tr.innerHTML = `<td class="cell">${item.name}</td>`;
                    } else {
                        const price = (item.price !== null && item.price !== undefined) ? `${item.price} kr` : '-';
                        tr.innerHTML = `<td class="cell">${item.name}</td><td class="cell-price">${price}</td>`;
                    }
                    tbody.appendChild(tr);
                });
                return table;
            }

            function appendRestaurantBlock(target, r, items, showPlaceholder, placeholderText) {
                if (!items.length && !showPlaceholder) return;
                const restaurantDiv = document.createElement('div');
                restaurantDiv.className = 'restaurant';
                restaurantDiv.dataset.rest = r.key;
                const isCollapsed = collapsed.has(r.key);
                if (items.length > 0) {
                    const prices = items.map(i => i.price);
                    const uniquePrices = [...new Set(prices)];
                    const hasUniformPrice = uniquePrices.length === 1;
                    const uniformPrice = hasUniformPrice ? uniquePrices[0] : null;
                    restaurantDiv.innerHTML = buildRestaurantHeader(r, hasUniformPrice, uniformPrice);
                    const contentWrap = document.createElement('div');
                    contentWrap.className = 'restaurant-content';
                    contentWrap.appendChild(createMenuTable(items, hasUniformPrice));
                    restaurantDiv.appendChild(contentWrap);
                } else {
                    restaurantDiv.innerHTML = buildRestaurantHeader(r, false, null);
                    const contentWrap = document.createElement('div');
                    contentWrap.className = 'restaurant-content';
                    contentWrap.innerHTML = `<div class="placeholder-note">${placeholderText}</div>`;
                    restaurantDiv.appendChild(contentWrap);
                }
                if (isCollapsed) restaurantDiv.classList.add('collapsed');
                target.appendChild(restaurantDiv);
            }

            function buildDayPanel(daySv) {
                const dayKey = daySv.toLowerCase().replace(/\s+/g, '-');
                const panel = document.createElement('div');
                panel.className = 'day-panel';
                panel.id = `panel-${dayKey}`;
                panel.setAttribute('role', 'tabpanel');

                const daySection = document.createElement('div');
                daySection.className = 'day-section';
                daySection.innerHTML = '';

                restaurants.forEach(r => {
                    if (r.weeklyOnly) return;
                    const items = (r.data || []).filter(item => normalizeDay(item.day) === daySv);
                    appendRestaurantBlock(
                        daySection,
                        r,
                        items,
                        true,
                        `Ingen meny hittades för ${daySv.toLowerCase()}. Klicka för att besöka.`
                    );
                });

                const weeklyItemsSection = document.createElement('div');
                weeklyItemsSection.className = 'day-section';
                weeklyItemsSection.innerHTML = '<div class="day-title">Hela veckan</div>';
                let anyWeekly = false;
                restaurants.forEach(r => {
                    const weeklyItems = (r.data || []).filter(item => normalizeDay(item.day) === 'Hela veckan');
                    if (!weeklyItems.length) return;
                    anyWeekly = true;
                    appendRestaurantBlock(weeklyItemsSection, r, weeklyItems, false, '');
                });
                if (anyWeekly) {
                    daySection.appendChild(weeklyItemsSection);
                }

                panel.appendChild(daySection);
                return panel;
            }

            days.forEach(daySv => {
                const dayKey = daySv.toLowerCase().replace(/\s+/g, '-');
                const tab = document.createElement('button');
                tab.className = 'day-tab';
                tab.setAttribute('role', 'tab');
                tab.setAttribute('aria-selected', 'false');
                tab.setAttribute('aria-controls', `panel-${dayKey}`);
                tab.dataset.day = daySv;
                tab.textContent = daySv;
                tabs.appendChild(tab);
                panels.appendChild(buildDayPanel(daySv));
            });

            content.appendChild(tabs);
            content.appendChild(panels);

            // Section listing restaurants with zero items all week
            const emptyRestaurants = restaurants.filter(r => !(restaurantsWithAnyItems.has(r.key)));
            if (emptyRestaurants.length) {
                const section = document.createElement('div');
                section.className = 'day-section';
                section.innerHTML = '<div class="day-title">Restauranger utan menydata</div>';
                emptyRestaurants.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'restaurant';
                    div.dataset.rest = r.key;
                    const isCollapsed = collapsed.has(r.key);
                    div.innerHTML = buildRestaurantHeader(r, false, null) + `<div class="restaurant-content"><div class="placeholder-note">Ingen meny kunde hämtas. Klicka för att besöka deras sida.</div></div>`;
                    if (isCollapsed) div.classList.add('collapsed');
                    section.appendChild(div);
                });
                content.appendChild(section);
            }

            applyToggleHandlers(document);

            function setActiveDay(daySv) {
                document.querySelectorAll('.day-tab').forEach(tab => {
                    const isActive = tab.dataset.day === daySv;
                    tab.setAttribute('aria-selected', String(isActive));
                });
                document.querySelectorAll('.day-panel').forEach(panel => {
                    if (panel.id === `panel-${daySv.toLowerCase().replace(/\s+/g, '-')}`) {
                        panel.classList.add('active');
                    } else {
                        panel.classList.remove('active');
                    }
                });
            }

            tabs.querySelectorAll('.day-tab').forEach(tab => {
                tab.addEventListener('click', () => setActiveDay(tab.dataset.day));
            });

            const today = new Date();
            const swedishDays = ['Söndag', 'Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag'];
            const todayName = swedishDays[today.getDay()];
            const defaultDay = days.includes(todayName) ? todayName : days[0];
            setActiveDay(defaultDay);
        }
        window.addEventListener('DOMContentLoaded', loadMenus);
    </script>
</body>

</html>
